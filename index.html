<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0b79d0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Hinode Signage">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="./icons/icon.svg">
<title>Hinode Smart Signage Ver.13</title>
<link rel="stylesheet" href="./style.css?v=13">
</head>
<body>
<div class="sky-bg"></div>

<main class="app">
  <header class="topbar">
    <div class="brand-block">
      <div class="sun-mark">☀</div>
      <div>
        <div class="brand">日乃出アートプロダクト</div>
        <div class="tagline">HINODE ART PRODUCT</div>
      </div>
    </div>
    <div class="top-actions">
      <select id="prefSelect" aria-label="地域選択"></select>
      <button id="settingsBtn" class="icon-btn" aria-label="設定">⚙</button>
    </div>
  </header>

  <section class="message-strip">
    <span id="topMessage">おはようございます！今日も一日、安全に気をつけて頑張りましょう！</span>
  </section>

  <section class="hero-grid">
    <article class="weather-main-card">
      <div class="section-title">現在の天気</div>
      <h1 id="areaName">奈良県</h1>
      <div class="weather-row">
        <div class="weather-icon" id="weatherIcon">🌤️</div>
        <div class="temp-now"><span id="tempNow">--</span><small>℃</small></div>
      </div>
      <div class="weather-text" id="weatherText">取得中</div>
      <div class="hi-low">
        <span>最高 <b id="highTemp">--</b></span>
        <span>最低 <b id="lowTemp">--</b></span>
      </div>
      <div class="weather-metrics">
        <div><span>降水確率</span><b id="pop">--%</b></div>
        <div><span>更新</span><b id="updatedAt">--:--</b></div>
      </div>
    </article>

    <article class="wbgt-card" id="wbgtCard">
      <div class="section-title dark">熱中症指数（WBGT）</div>
      <div class="wbgt-level" id="wbgtLevel">判定中</div>
      <div class="wbgt-value"><span id="wbgtValue">--</span></div>
      <p id="wbgtMessage">暑さ指数を判定しています。</p>
      <div class="risk-scale">
        <span data-risk="caution">注意</span>
        <span data-risk="warning">警戒</span>
        <span data-risk="severe">厳重警戒</span>
        <span data-risk="danger">危険</span>
      </div>
    </article>
  </section>

  <section class="summary-card">
    <p id="summaryText">気象庁APIから天気情報を取得しています。</p>
  </section>

  <section class="tab-card">
    <button id="hourlyModeBtn" class="tab active">時間ごとの天気</button>
    <button id="weeklyModeBtn" class="tab">週間天気</button>
  </section>

  <section class="forecast-card">
    <div id="hourlyPanel" class="hourly-scroll"></div>
    <div id="weeklyPanel" class="weekly-compact hidden"></div>
  </section>

  <footer class="ticker-wrap">
    <div id="tickerText" class="ticker">本日も猛暑が予想されます。こまめな水分補給と休憩を忘れずに！</div>
  </footer>
</main>

<div class="modal-backdrop hidden" id="modalBackdrop"></div>
<aside class="settings-panel hidden" id="settingsPanel">
  <div class="settings-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-head">
      <h3>表示設定</h3>
      <button id="closeSettings">×</button>
    </div>

    <label>上部テキスト
      <input id="topTextInput" type="text">
    </label>

    <label>下部テロップ
      <input id="tickerInput" type="text">
    </label>

    <label>地域
      <select id="prefSelectSettings"></select>
    </label>

    <div class="setting-title">予報表示</div>
    <div class="segmented">
      <button id="hourlyModeBtnSetting">時間別</button>
      <button id="weeklyModeBtnSetting">週間</button>
    </div>

    <button id="saveSettings" class="save-btn">保存して反映</button>
  </div>
</aside>

<script src="./script.js?v=13"></script>
<script>
if ("serviceWorker" in navigator) window.addEventListener("load",()=>navigator.serviceWorker.register("./service-worker.js?v=13"));
</script>
</body>
</html>
