<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Hinode Signage">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="./icons/icon.svg">
<title>Hinode Smart Signage Ver.14</title>
<link rel="stylesheet" href="./style.css?v=14">
</head>
<body>
<main class="app">
  <header class="topbar">
    <div class="logo-area">
      <div class="symbol">
        <span class="sun">☀</span>
        <span class="hm">HN</span>
      </div>
      <div>
        <div class="company">HINODE ART PRODUCT</div>
        <div class="jp">日乃出アートプロダクト</div>
      </div>
    </div>
    <div class="area-select">
      <span class="pin">📍</span>
      <select id="prefSelect"></select>
      <button id="settingsBtn">⚙</button>
    </div>
  </header>

  <section class="message-bar">
    <span class="msg-icon">📣</span>
    <span id="topMessage">おはようございます！今日も一日、安全に気をつけて頑張りましょう！</span>
    <span class="edit">✎</span>
  </section>

  <section class="main-grid">
    <article class="panel weather-panel">
      <div class="panel-title">現在の天気</div>
      <div class="weather-main">
        <div id="weatherIcon" class="weather-icon">🌤️</div>
        <div class="temp-now"><span id="tempNow">--</span><small>℃</small></div>
      </div>
      <div id="weatherText" class="weather-text">取得中</div>
      <div class="weather-data">
        <div><span>最高</span><b id="highTemp">--</b></div>
        <div><span>最低</span><b id="lowTemp">--</b></div>
        <div><span>降水</span><b id="pop">--%</b></div>
        <div><span>更新</span><b id="updatedAt">--:--</b></div>
      </div>
    </article>

    <article class="panel wbgt-panel" id="wbgtCard">
      <div class="wbgt-title">熱中症指数（WBGT）</div>
      <div id="wbgtLevel" class="wbgt-level">判定中</div>
      <div class="wbgt-value"><span id="wbgtValue">--</span></div>
      <div id="wbgtMessage" class="wbgt-message">暑さ指数を判定しています。</div>
      <div class="risk-scale">
        <span data-risk="caution">注意<br><small>21未満</small></span>
        <span data-risk="warning">警戒<br><small>21〜25</small></span>
        <span data-risk="severe">厳重警戒<br><small>25〜28</small></span>
        <span data-risk="danger">危険<br><small>28以上</small></span>
      </div>
    </article>
  </section>

  <section class="summary-panel">
    <span>INFO</span>
    <p id="summaryText">気象庁APIから天気情報を取得しています。</p>
  </section>

  <section class="tab-card">
    <button id="hourlyModeBtn" class="tab active">🕘 時間ごとの天気</button>
    <button id="weeklyModeBtn" class="tab">📅 週間天気</button>
  </section>

  <section class="panel forecast-panel">
    <div id="hourlyPanel" class="hourly-scroll"></div>
    <div id="weeklyPanel" class="weekly-grid hidden"></div>
  </section>

  <footer class="ticker-wrap">
    <span class="msg-icon">📣</span>
    <div id="tickerText" class="ticker">本日も猛暑が予想されます。こまめな水分補給と休憩を忘れずに！</div>
    <span class="edit">✎</span>
  </footer>
</main>

<div id="modalBackdrop" class="modal-backdrop hidden"></div>
<aside id="settingsPanel" class="settings-panel hidden">
  <div class="settings-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-head">
      <h3>表示設定</h3>
      <button id="closeSettings">×</button>
    </div>

    <label>上部テキスト<input id="topTextInput" type="text"></label>
    <label>下部テロップ<input id="tickerInput" type="text"></label>
    <label>地域<select id="prefSelectSettings"></select></label>

    <div class="setting-title">予報表示</div>
    <div class="segmented">
      <button id="hourlyModeBtnSetting">時間別</button>
      <button id="weeklyModeBtnSetting">週間</button>
    </div>

    <button id="saveSettings" class="save-btn">保存して反映</button>
  </div>
</aside>

<script src="./script.js?v=14"></script>
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load",()=>navigator.serviceWorker.register("./service-worker.js?v=14"));
}
</script>
</body>
</html>
